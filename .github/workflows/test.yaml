# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: test
on:
  push: {}
  workflow_call: {}
  pull_request:
    types: [opened, synchronize, reopened, edited]
  schedule:
    # 8AM first day of the month in JAN and JUNE to keep workflow badges up-to-date
    - cron: "0 8 1 1,6 *"

env:
  MISE_GITHUB_TOKEN: ${{ github.token }}
  MISE_AUTO_INSTALL: "0"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          env: false
      - run: >-
          mise install task aqua:nextest-rs/nextest/cargo-nextest
          github:romnn/cargo-feature-combinations
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Feature-combination tests
        run: task test:fc
      - name: Doc-tests
        run: task test:doc

  publish:
    name: publish (dry-run)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      # bootstrap: publish ourselves
      - name: Publish crates (dry-run)
        run: cargo run -p cargo-publish-crates
        env:
          PUBLISH_CRATES_RESOLVE_VERSIONS: true
          PUBLISH_CRATES_DRY_RUN: true
