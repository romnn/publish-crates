# unwrap/expect/panic/indexing are denied in production (workspace lints) but are the
# idiomatic failure mode in tests — scope the denies to non-test code.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-indexing-slicing-in-tests = true

# Proper nouns that look like code identifiers but should not be backticked in prose.
# `..` APPENDS to clippy's built-in list (GitHub, OAuth, …) instead of replacing it.
doc-valid-idents = ["PyPI", "GOPROXY", ".."]

disallowed-macros = [
  { path = "std::dbg", reason = "remove before commit" },
]
